<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nava — Concerts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --navy: #1a3a6b;
            --navy-soft: #2c5494;
            --gold: #c9a96e;
            --gold-dim: rgba(201, 169, 110, 0.35);
            --cream: #f5f0e8;
            --bg: #0c0c10;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .wrap {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
        }

        .line {
            display: block;
            width: 48px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
            margin: 0 auto 1.8rem;
        }

        .nava {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-size: clamp(1.8rem, 6vw, 3.8rem);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--navy);
            cursor: default;
            user-select: none;
            transition: color 0.8s ease, letter-spacing 0.8s ease, text-shadow 0.8s ease;
            text-shadow: none;
        }

        .nava:hover {
            color: var(--navy-soft);
            letter-spacing: 0.38em;
            text-shadow: 0 0 30px rgba(26, 58, 107, 0.25);
        }

        .tagline {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-size: clamp(0.6rem, 1.2vw, 0.75rem);
            letter-spacing: 0.45em;
            text-transform: uppercase;
            color: var(--gold);
            opacity: 0.4;
            margin-top: 1.4rem;
            transition: opacity 0.8s ease, letter-spacing 0.8s ease;
        }

        .wrap:hover .tagline {
            opacity: 0.7;
            letter-spacing: 0.55em;
        }

        .line--bottom {
            margin: 1.8rem auto 0;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <span class="line"></span>
        <h1 class="nava">Nava Concerts</h1>
        <p class="tagline">By Invitation Only</p>
        <span class="line line--bottom"></span>
    </div>
</body>
</html>
