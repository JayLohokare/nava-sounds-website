<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nava — Concerts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #c9a96e;
            --gold-dim: rgba(201, 169, 110, 0.35);
            --gold-bright: #e0c68a;
            --bg: #0a0a0a;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .wrap {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
        }

        .logo {
            width: clamp(80px, 15vw, 180px);
            height: auto;
            margin: 0 auto 1.5rem;
            display: block;
            filter: drop-shadow(0 0 20px rgba(201, 169, 110, 0.3));
            transition: filter 0.8s ease, transform 0.8s ease;
        }

        .wrap:hover .logo {
            filter: drop-shadow(0 0 35px rgba(201, 169, 110, 0.5));
            transform: scale(1.05);
        }

        .line {
            display: block;
            width: 48px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
            margin: 0 auto 1.8rem;
        }

        .nava {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-size: clamp(1.8rem, 6vw, 3.8rem);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--gold);
            cursor: default;
            user-select: none;
            transition: color 0.8s ease, letter-spacing 0.8s ease, text-shadow 0.8s ease;
            text-shadow: none;
        }

        .nava:hover {
            color: var(--gold-bright);
            letter-spacing: 0.38em;
            text-shadow: 0 0 25px rgba(201, 169, 110, 0.2);
        }

        .line--bottom {
            margin: 1.8rem auto 0;
        }

        /* Hamburger Menu */
        .menu-toggle {
            position: fixed;
            top: 1.5rem;
            left: 1.5rem;
            z-index: 1000;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
        }

        .hamburger {
            display: block;
            width: 28px;
            height: 2px;
            background: var(--gold);
            position: relative;
            transition: background 0.3s ease;
        }

        .hamburger::before,
        .hamburger::after {
            content: '';
            position: absolute;
            width: 28px;
            height: 2px;
            background: var(--gold);
            left: 0;
            transition: transform 0.3s ease;
        }

        .hamburger::before {
            top: -8px;
        }

        .hamburger::after {
            top: 8px;
        }

        .menu-toggle.active .hamburger {
            background: transparent;
        }

        .menu-toggle.active .hamburger::before {
            transform: rotate(45deg);
            top: 0;
        }

        .menu-toggle.active .hamburger::after {
            transform: rotate(-45deg);
            top: 0;
        }

        /* Menu Panel */
        .menu-panel {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            width: 280px;
            background: rgba(10, 10, 10, 0.98);
            border-right: 1px solid var(--gold-dim);
            padding: 5rem 2rem 3rem;
            transform: translateX(-100%);
            transition: transform 0.4s ease;
            z-index: 999;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .menu-panel.active {
            transform: translateX(0);
        }

        .menu-panel ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .menu-panel a {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-size: 1.1rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--gold);
            text-decoration: none;
            opacity: 0.6;
            transition: opacity 0.3s ease, letter-spacing 0.3s ease;
        }

        .menu-panel a:hover {
            opacity: 1;
            letter-spacing: 0.2em;
        }

        .menu-footer {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--gold-dim);
        }

        .menu-footer span {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gold);
            opacity: 0.4;
        }

        /* Overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.5);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 998;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <span class="line"></span>
        <img src="logo.png" alt="Nava Logo" class="logo">
        <h1 class="nava">Nava Concerts</h1>
        <span class="line line--bottom"></span>
    </div>

    <!-- Hamburger Toggle -->
    <button class="menu-toggle" onclick="toggleMenu()">
        <span class="hamburger"></span>
    </button>

    <!-- Menu Panel -->
    <nav class="menu-panel">
        <ul>
            <li><a href="#events" onclick="toggleMenu()">Events</a></li>
            <li><a href="#contact" onclick="toggleMenu()">Contact</a></li>
        </ul>
        <div class="menu-footer">
            <span>Nava Sounds LLC</span>
        </div>
    </nav>

    <!-- Overlay -->
    <div class="overlay" onclick="toggleMenu()"></div>

    <script>
        function toggleMenu() {
            document.querySelector('.menu-toggle').classList.toggle('active');
            document.querySelector('.menu-panel').classList.toggle('active');
            document.querySelector('.overlay').classList.toggle('active');
        }
    </script>
</body>
</html>
